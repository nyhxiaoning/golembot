<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 190" fill="none">
  <defs>
    <linearGradient id="clay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0724A"/>
      <stop offset="100%" stop-color="#7D5A3C"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0969DA"/>
      <stop offset="100%" stop-color="#1A7FD4"/>
    </linearGradient>
    <filter id="eyeglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Golem head - blocky, clay-like -->
  <rect x="30" y="20" width="130" height="150" rx="18" fill="url(#clay)"/>

  <!-- Forehead crack lines (clay texture) -->
  <path d="M60 35 L78 62 L67 56" stroke="#5C3D2E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M115 32 L103 54 L112 48" stroke="#5C3D2E" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Eyes - glowing blue representing the AI soul -->
  <rect x="52" y="72" width="30" height="22" rx="4" fill="#2D1B0E"/>
  <rect x="108" y="72" width="30" height="22" rx="4" fill="#2D1B0E"/>
  <rect x="55" y="75" width="24" height="16" rx="3" fill="url(#glow)" filter="url(#eyeglow)"/>
  <rect x="111" y="75" width="24" height="16" rx="3" fill="url(#glow)" filter="url(#eyeglow)"/>

  <!-- Mouth - straight line, stoic golem expression -->
  <rect x="65" y="122" width="60" height="6" rx="3" fill="#5C3D2E"/>

  <!-- Hebrew-inspired mark on forehead (aleph) -->
  <text x="95" y="58" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#5C3D2E" opacity="0.7">&#x05D0;</text>

  <!-- Text: GolemBot -->
  <text x="195" y="90" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="58" font-weight="700" fill="#1F2328">Golem</text>
  <text x="452" y="90" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="58" font-weight="700" fill="url(#glow)" filter="url(#textglow)">Bot</text>

  <!-- Tagline -->
  <text x="195" y="122" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="15" fill="#656D76">Coding Agent = soul, GolemBot = body of clay</text>

  <!-- Terminal cursor blinking effect -->
  <rect x="195" y="142" width="10" height="20" rx="1" fill="url(#glow)" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
